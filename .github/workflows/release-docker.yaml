name: Release docker container

on:
  push:
    tags:
      - v*

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build
        runs-on: ubuntu-24.04

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Run build action
              uses: minvws/action-python-poetry-install@2a1cbf8c2270c5fec60acdbfebae3c072c27f1cb # v1.0.2
              with:
                python_version: "3.14"


    push_container:
        name: Create and publish Docker image to the Github Package Registry
        runs-on: ubuntu-24.04
        needs: [build]
        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Log in to the Container registry
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Create version.json
              run: |
                RELEASE_VERSION="${GITHUB_REF#refs/*/}"
                echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
                echo "{ \"version\": \"${RELEASE_VERSION}\", \"git_ref\": \"$GITHUB_SHA\"}" > version.json

            - name: Extract metadata (tags, labels) for Docker
              id: meta
              uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
              with:
                images: ghcr.io/${{ github.repository }}

            - name: Build Docker image
              uses: docker/build-push-action@ee4ca427a2f43b6a16632044ca514c076267da23 # v6.19.0
              env:
                NEW_UID: 1003
                NEW_GID: 1003
              with:
                context: .
                file: docker/Dockerfile
                push: false
                load: true
                tags: ${{ steps.meta.outputs.tags }}
                labels: ${{ steps.meta.outputs.labels }}
                build-args: |
                  NEW_UID=${{ env.NEW_UID }}
                  NEW_GID=${{ env.NEW_GID }}

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
              with:
                image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
                format: "sarif"
                output: "trivy-results.sarif"
                exit-code: "0"
                severity: "CRITICAL,HIGH"
                vuln-type: "library"

            # Re-enable if Code security tab upload is enabled by OPS
            # - name: Upload Trivy scan results to GitHub Security tab
            #   uses: github/codeql-action/upload-sarif@4e94bd11f71e507f7f87df81788dff88d1dacbfb # v4.31.0
            #   # Only upload SARIF results on main branch or version tags
            #   if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
            #   with:
            #     sarif_file: "trivy-results.sarif"

            - name: Fail on vulnerabilities
              uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
              with:
                image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
                format: "table"
                exit-code: "0"
                severity: "CRITICAL,HIGH"
                vuln-type: "library"
                skip-setup-trivy: true

            - name: Push Docker image
              uses: docker/build-push-action@ee4ca427a2f43b6a16632044ca514c076267da23 # v6.19.0
              if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
              env:
                NEW_UID: 1003
                NEW_GID: 1003
              with:
                context: .
                file: docker/Dockerfile
                push: true
                tags: ${{ steps.meta.outputs.tags }}
                labels: ${{ steps.meta.outputs.labels }}
                build-args: |
                  NEW_UID=${{ env.NEW_UID }}
                  NEW_GID=${{ env.NEW_GID }}
